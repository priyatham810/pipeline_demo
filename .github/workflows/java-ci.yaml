name: 06-Java-CI

on:
  push:
    paths:
      - "java-app/**"

jobs:
  java:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean install
        working-directory: java-app
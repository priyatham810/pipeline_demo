name: Cache

on:
 push

jobs:
  cache-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: cache-${{ hashFiles('node-app/package.json') }}

      - name: Install dependencies
        run: npm install
        working-directory: node-app